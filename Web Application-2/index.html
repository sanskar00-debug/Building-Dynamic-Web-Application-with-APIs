<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Task Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Task Tracker Dashboard</h1>
        <p class="subtitle">Fetching live server data in real-time</p>
        
        <!-- Data Display Card -->
        <div class="card" id="task-card">
            <div id="loading-state" class="hidden">Fetching latest task...</div>
            <div id="data-container">
                <span class="badge" id="task-status">Status</span>
                <h2 id="task-title">Click the button below to load a task.</h2>
                <p id="task-meta">User ID: <span id="user-id">--</span> | Task ID: <span id="task-id">--</span></p>
            </div>
        </div>

        <!-- Action Button for Dynamic Updates -->
        <button id="fetch-btn">Fetch Next Random Task</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
